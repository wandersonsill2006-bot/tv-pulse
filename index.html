<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>CineStreamFlix | Wanderson</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
        :root { --primary: #e50914; --bg: #050505; --card-bg: #181818; }
        
        body { background-color: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }
        
        header { 
            padding: 30px 20px; 
            text-align: center; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px);
        }

        h1 { color: var(--primary); font-size: 2.2rem; margin: 0 0 15px 0; letter-spacing: 3px; text-shadow: 2px 2px 10px rgba(229, 9, 20, 0.5); }

        .search-container { max-width: 500px; margin: 0 auto; }
        .search-container input {
            width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #444;
            background: rgba(255,255,255,0.1); color: white; outline: none; transition: 0.3s;
        }
        .search-container input:focus { border-color: var(--primary); background: rgba(255,255,255,0.2); }

        .catalogo-row { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; padding: 40px; 
        }

        .item-card { 
            background: var(--card-bg); border-radius: 10px; overflow: hidden; 
            transition: 0.4s; cursor: pointer; border: 1px solid #222; position: relative;
        }
        .item-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        /* Thumbnail automática usando o próprio vídeo */
        .video-preview { 
            width: 100%; height: 140px; background: #000; position: relative; overflow: hidden;
        }
        .video-preview video {
            width: 100%; height: 100%; object-fit: cover; opacity: 0.7;
        }
        .item-card:hover .video-preview video { opacity: 1; transform: scale(1.1); transition: 0.5s; }

        .hd-badge {
            position: absolute; top: 10px; right: 10px; background: var(--primary);
            color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 3px;
        }

        .play-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 40px; opacity: 0.8;
        }

        .item-info { padding: 12px; font-size: 0.85rem; background: #181818; }
        .item-info strong { display: block; margin-bottom: 5px; color: #fff; }
        .item-info span { color: #777; font-size: 0.75rem; }

        /* Estilo do Player */
        #modal-player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        video#main-player { width: 100%; height: 100%; }
        .btn-fechar { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; z-index: 2100; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <header>
        <h1>CINESTREAMFLIX</h1>
        <div class="search-container">
            <input type="text" id="inputBusca" placeholder="Pesquisar filme..." onkeyup="filtrarLocal()">
        </div>
    </header>

    <div id="lista-automatica" class="catalogo-row"></div>

    <div id="modal-player">
        <span class="btn-fechar" onclick="fecharPlayer()">&times;</span>
        <video id="main-player" controls autoplay></video>
    </div>

    <script>
        async function carregarFilmesDoBot() {
            const container = document.getElementById('lista-automatica');
            try {
                const response = await fetch('filmes.json');
                const filmes = await response.json();
                container.innerHTML = '';

                filmes.reverse().forEach((filme, index) => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    
                    // Extrai o nome da legenda separada por "|" no bot
                    const partes = filme.data.split(' | ');
                    const nome = partes[0] || "Filme Sem Título";
                    const data = partes[1] || "";

                    card.innerHTML = `
                        <div class="video-preview">
                            <span class="hd-badge">HD</span>
                            <div class="play-icon">▶</div>
                            <video src="${filme.url}#t=0.5" preload="metadata" muted></video>
                        </div>
                        <div class="item-info">
                            <strong>${nome}</strong>
                            <span>${data}</span>
                        </div>
                    `;
                    
                    card.onclick = () => abrirPlayer(filme.url);
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = '<p style="text-align:center; color:#666;">Nenhum filme encontrado ainda.</p>';
            }
        }

        function abrirPlayer(url) {
            const modal = document.getElementById('modal-player');
            const video = document.getElementById('main-player');
            modal.style.display = 'block';
            video.src = url;
            document.body.style.overflow = 'hidden'; // Trava o scroll atrás
        }

        function fecharPlayer() {
            const modal = document.getElementById('modal-player');
            const video = document.getElementById('main-player');
            modal.style.display = 'none';
            video.pause();
            video.src = "";
            document.body.style.overflow = 'auto';
        }

        function filtrarLocal() {
            const termo = document.getElementById('inputBusca').value.toLowerCase();
            const cards = document.getElementsByClassName('item-card');
            for (let card of cards) {
                card.style.display = card.innerText.toLowerCase().includes(termo) ? "block" : "none";
            }
        }

        window.onload = carregarFilmesDoBot;
    </script>
</body>
</html>
