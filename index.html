<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>CineStreamFlix | Wanderson Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        :root { --primary: #e50914; --bg: #050505; }
        body { background-color: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; }
        header { padding: 30px; text-align: center; background: linear-gradient(to bottom, #1a0202, transparent); }
        h1 { color: var(--primary); font-size: 2.5rem; font-weight: 900; margin: 0; letter-spacing: 3px; }
        .catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 40px; }
        .card { position: relative; background: #111; border-radius: 10px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .card:hover { transform: scale(1.05); border-color: var(--primary); }
        .card img { width: 100%; height: 270px; object-fit: cover; }
        .card-rating { position: absolute; top: 10px; right: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
        /* Cores de idade */
        .rating-l { background: #00a859; } .rating-12 { background: #f7941e; } .rating-14 { background: #ec1c24; } .rating-16 { background: #000; }
        #modal-player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 70vh; border: none; }
        .fechar { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <header><h1>CINESTREAMFLIX</h1></header>
    <div id="lista-filmes" class="catalogo"></div>

    <div id="modal-player">
        <span class="fechar" onclick="fechar()">&times;</span>
        <div id="player-view"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiahEvGq4EuERgpcfTf8UTjaHxQw-FMaU",
            authDomain: "cinestreamflix-1c47d.firebaseapp.com",
            databaseURL: "https://cinestreamflix-1c47d-default-rtdb.firebaseio.com/",
            projectId: "cinestreamflix-1c47d",
            storageBucket: "cinestreamflix-1c47d.firebasestorage.app",
            appId: "1:676363328136:web:bbe4bba4e7a1ad95429d3d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const TMDB_KEY = '223cb5a235d933b296887f55b2da4f4f';

        onValue(ref(db, 'filmes'), (snapshot) => {
            const container = document.getElementById('lista-filmes');
            container.innerHTML = ''; 
            snapshot.forEach((child) => {
                const filme = child.val();
                fetch(`https://api.themoviedb.org/3/movie/${filme.tmdb_id}?api_key=${TMDB_KEY}&language=pt-BR&append_to_response=release_dates`)
                .then(r => r.json()).then(data => {
                    const br = data.release_dates.results.find(r => r.iso_3166_1 === 'BR');
                    const age = br ? br.release_dates[0].certification : "L";
                    container.innerHTML += `
                        <div class="card" onclick="play('${filme.url}')">
                            <div class="card-rating rating-${age.toLowerCase()}">${age}</div>
                            <img src="https://image.tmdb.org/t/p/w500${data.poster_path}">
                            <div style="padding:10px; text-align:center; font-weight:bold;">${data.title}</div>
                        </div>`;
                });
            });
        });

        window.play = (url) => {
            document.getElementById('modal-player').style.display = 'block';
            document.getElementById('player-view').innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
        }
        window.fechar = () => { document.getElementById('modal-player').style.display = 'none'; }
    </script>
</body>
</html>
