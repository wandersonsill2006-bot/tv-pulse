<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <title>CineStreamFlix | Wanderson Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
        :root { --primary: #e50914; --bg: #050505; --card-bg: #111; }
        
        body { background-color: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }
        
        header { padding: 20px 10px; text-align: center; background: linear-gradient(to bottom, #1a0202, transparent); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        h1 { color: var(--primary); font-size: 1.8rem; margin: 0 0 15px 0; letter-spacing: 2px; text-transform: uppercase; }

        .search-container { position: relative; max-width: 500px; margin: 0 auto; padding: 0 15px; }
        .search-container input { width: 100%; padding: 12px 20px 12px 45px; border-radius: 50px; border: 2px solid #222; background: rgba(15, 15, 15, 0.9); color: white; outline: none; box-sizing: border-box; }
        .search-container i { position: absolute; left: 30px; top: 50%; transform: translateY(-50%); color: #666; }

        .catalogo-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }

        @media (max-width: 600px) {
            .catalogo-row { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px; }
            h1 { font-size: 1.5rem; }
            .item-card img { height: 250px !important; }
        }

        .item-card { position: relative; background: var(--card-bg); border-radius: 10px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; }
        .item-card img { width: 100%; height: 280px; object-fit: cover; display: block; }
        .badge-idade { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: bold; font-size: 0.8rem; z-index: 10; }
        .item-info { padding: 10px; text-align: center; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #modal-player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; overflow-y: auto; }
        .container-video { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
        
        #player-area { height: 85vh; background: #000; position: relative; transition: 0.3s; }
        #player-area iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 900px) and (orientation: landscape) {
            #player-area { height: 100vh; width: 100vw; }
            .detalhes-play { display: none; }
        }

        @media (max-width: 768px) and (orientation: portrait) {
            #player-area { height: 40vh; }
        }
        
        .btn-fechar { position: fixed; top: 15px; right: 15px; color: #fff; font-size: 35px; cursor: pointer; z-index: 1005; background: rgba(229, 9, 20, 0.8); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid white; }
        
        .detalhes-play { padding: 20px; background: #080808; border-top: 2px solid var(--primary); }
        .elenco-container { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0; }
        .elenco-card { min-width: 90px; text-align: center; }
        .elenco-card img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        footer { background: #080808; padding: 40px 20px; border-top: 2px solid var(--primary); margin-top: 40px; text-align: center; }
        .footer-content { max-width: 800px; margin: 0 auto; color: #555; font-size: 0.75rem; text-align: justify; }
    </style>
</head>
<body>

    <header>
        <h1>CINESTREAMFLIX</h1>
        <div class="search-container">
            <input type="text" id="inputBusca" placeholder="Pesquisar filme..." onkeyup="filtrarLocal()">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </header>

    <div id="lista-filmes" class="catalogo-row"></div>

    <div id="modal-player">
        <span class="btn-fechar" onclick="fecharPlayer()">&times;</span>
        <div class="container-video">
            <div id="player-area"></div>
            <div class="detalhes-play" id="player-info"></div>
        </div>
    </div>

    <footer>
        <h2 style="color: var(--primary); font-size: 1.2rem;">CINESTREAMFLIX</h2>
        <div class="footer-content">
            <p><strong>AVISO:</strong> O CineStreamFlix é um indexador automático. Não hospedamos arquivos.</p>
            <p><strong>REQUISITOS:</strong> Recomendamos 10Mbps para uma boa experiência.</p>
        </div>
        <div style="margin-top: 20px; color: #444; font-size: 0.7rem;">
            © 2026 | Desenvolvido por <strong>Wanderson Pro</strong>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiahEvGq4EuERgpcfTf8UTjaHxQw-FMaU",
            authDomain: "cinestreamflix-1c47d.firebaseapp.com",
            databaseURL: "https://cinestreamflix-1c47d-default-rtdb.firebaseio.com/",
            projectId: "cinestreamflix-1c47d",
            storageBucket: "cinestreamflix-1c47d.firebasestorage.app",
            appId: "1:676363328136:web:bbe4bba4e7a1ad95429d3d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const API_KEY = '223cb5a235d933b296887f55b2da4f4f';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';

        onValue(ref(db, 'filmes'), (snapshot) => {
            const container = document.getElementById('lista-filmes');
            container.innerHTML = '';
            snapshot.forEach((child) => {
                const filme = child.val();
                fetch(`${BASE_URL}/movie/${filme.tmdb_id}?api_key=${API_KEY}&language=pt-BR&append_to_response=release_dates`)
                .then(r => r.json()).then(data => {
                    let idade = "L"; const br = data.release_dates.results.find(r => r.iso_3166_1 === 'BR');
                    if (br && br.release_dates[0].certification) idade = br.release_dates[0].certification;
                    container.innerHTML += `
                        <div class="item-card" data-nome="${data.title.toLowerCase()}" onclick="abrirPlayer(${filme.tmdb_id}, '${filme.url}')">
                            <div class="badge-idade" style="background:#e1131b">${idade}</div>
                            <img src="${IMG_URL + data.poster_path}">
                            <div class="item-info">${data.title}</div>
                        </div>`;
                });
            });
        });

        window.abrirPlayer = async function(id, url) {
            const res = await fetch(`${BASE_URL}/movie/${id}?api_key=${API_KEY}&language=pt-BR&append_to_response=credits`);
            const data = await res.json();
            
            document.getElementById('player-area').innerHTML = `
                <iframe 
                    src="${url}" 
                    allowfullscreen 
                    allow="autoplay; fullscreen" 
                    sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation">
                </iframe>`;

            let elencoHtml = '';
            data.credits.cast.slice(0, 8).forEach(ator => {
                elencoHtml += `<div class="elenco-card"><img src="${IMG_URL + (ator.profile_path || '')}" onerror="this.src='https://via.placeholder.com/70'"><b>${ator.name}</b></div>`;
            });
            document.getElementById('player-info').innerHTML = `<h2>${data.title}</h2><p>${data.overview}</p><h3>Elenco</h3><div class="elenco-container">${elencoHtml}</div>`;
            document.getElementById('modal-player').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        window.fecharPlayer = () => { document.getElementById('modal-player').style.display = 'none'; document.getElementById('player-area').innerHTML = ''; document.body.style.overflow = 'auto'; }
        window.filtrarLocal = () => { const t = document.getElementById('inputBusca').value.toLowerCase(); document.querySelectorAll('.item-card').forEach(c => c.style.display = c.getAttribute('data-nome').includes(t) ? "block" : "none"); }
    </script>
</body>
</html>
