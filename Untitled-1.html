<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream Ultra - Catálogo Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --accent: #d112ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* Header Fixa */
        .header {
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            position: fixed; width: 100%; z-index: 1000;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.6rem; font-weight: 900; color: white; text-decoration: none; }
        .logo span { color: var(--accent); }

        /* Busca */
        .search-box { position: relative; width: 280px; }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 15px 10px 40px; border-radius: 25px; color: white; outline: none;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-box i { position: absolute; left: 15px; top: 12px; color: #666; }

        /* Banner */
        .hero {
            height: 75vh; background-size: cover; background-position: center top;
            display: flex; align-items: center; padding: 0 5%; position: relative;
            background-color: #111; /* Fundo caso a imagem demore */
        }
        .hero::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to right, #050505 20%, transparent 80%),
                        linear-gradient(to top, #050505 10%, transparent 30%);
        }
        .hero-content { position: relative; z-index: 2; max-width: 650px; }
        .hero-content h1 { font-size: 3.5rem; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .btn-play {
            background: var(--accent); color: white; border: none; padding: 14px 35px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }

        /* Conteúdo */
        .main-container { padding: 40px 5%; }
        .section-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 25px; border-left: 5px solid var(--accent); padding-left: 15px; }

        /* Grid Melhorado */
        .movie-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 25px;
        }
        .movie-card {
            background: #111; border-radius: 10px; overflow: hidden;
            transition: 0.4s; cursor: pointer; border: 1px solid transparent;
        }
        .movie-card:hover { transform: scale(1.05); border-color: var(--accent); box-shadow: 0 0 15px rgba(209, 18, 255, 0.2); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .movie-info { padding: 12px; }
        .movie-title { font-size: 0.85rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Player */
        #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: white; cursor: pointer; z-index: 2100; }
    </style>
</head>
<body>

    <header class="header">
        <a href="#" class="logo">CINESTREAM<span>PRO</span></a>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="input-busca" placeholder="Buscar filmes ou séries..." onkeyup="fazerBusca(this.value)">
        </div>
    </header>

    <div id="player-view">
        <span class="close-btn" onclick="fecharPlayer()">✕</span>
        <div id="video-portal" style="width:100%; height:100%;"></div>
    </div>

    <section class="hero" id="hero-banner">
        <div class="hero-content">
            <h1 id="hero-title">Carregando...</h1>
            <p id="hero-desc" style="color: #bbb; margin-bottom: 25px; font-size: 1.1rem;"></p>
            <button class="btn-play" onclick="abrirPlayer('Destaque')">
                <i class="fas fa-play"></i> Assistir Agora
            </button>
        </div>
    </section>

    <div class="main-container">
        <div class="section-title" id="texto-lista">Populares no CineStream</div>
        <div class="movie-grid" id="grid-filmes"></div>
    </div>

    <script>
        const API_KEY = '223cb5a235d933b296887f55b2da4f4f'; 
        const IMG_ORIGINAL = 'https://image.tmdb.org/t/p/original';
        const IMG_POSTER = 'https://image.tmdb.org/t/p/w500';
        let player;

        async function carregarCatalogo() {
            try {
                let listaFinal = [];
                for(let p = 1; p <= 3; p++) {
                    const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=pt-BR&page=${p}`);
                    const data = await res.json();
                    // Filtra apenas filmes que possuem poster E backdrop para evitar tela preta
                    const filtrados = data.results.filter(f => f.poster_path && f.backdrop_path);
                    listaFinal = [...listaFinal, ...filtrados];
                }

                if(listaFinal.length > 0) {
                    const destaque = listaFinal[0];
                    document.getElementById('hero-banner').style.backgroundImage = `url('${IMG_ORIGINAL + destaque.backdrop_path}')`;
                    document.getElementById('hero-title').innerText = destaque.title;
                    document.getElementById('hero-desc').innerText = destaque.overview ? destaque.overview.substring(0, 160) + "..." : "Sem descrição disponível.";
                    renderizarFilmes(listaFinal.slice(1));
                }
            } catch (e) { console.error("Erro na carga:", e); }
        }

        async function fazerBusca(query) {
            if (query.length < 3) {
                if (query.length === 0) carregarCatalogo();
                return;
            }
            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=pt-BR&query=${query}`);
                const data = await res.json();
                // Filtra resultados sem imagem na busca também
                const filtrados = data.results.filter(f => f.poster_path);
                document.getElementById('texto-lista').innerText = "Resultados para: " + query;
                renderizarFilmes(filtrados);
            } catch (e) { console.error(e); }
        }

        function renderizarFilmes(lista) {
            const grid = document.getElementById('grid-filmes');
            if (lista.length === 0) {
                grid.innerHTML = "<p style='color: #666;'>Nenhum filme encontrado com imagem.</p>";
                return;
            }
            grid.innerHTML = lista.map(f => `
                <div class="movie-card" onclick="abrirPlayer('${f.title}')">
                    <img src="${IMG_POSTER + f.poster_path}" 
                         onerror="this.src='https://via.placeholder.com/500x750?text=CineStream+Poster'" 
                         alt="${f.title}" loading="lazy">
                    <div class="movie-info">
                        <div class="movie-title">${f.title}</div>
                        <div style="font-size: 0.75rem; color: #ffcc00;"><i class="fas fa-star"></i> ${f.vote_average}</div>
                    </div>
                </div>
            `).join('');
        }

        function abrirPlayer(titulo) {
            document.getElementById('player-view').style.display = 'block';
            const portal = document.getElementById('video-portal');
            const linkHLS = "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8";

            if (player) player.destroy();
            player = new Clappr.Player({
                source: linkHLS,
                parentId: "#video-portal",
                width: '100%', height: '100%', autoPlay: true,
                playback: { playInline: true }
            });
        }

        function fecharPlayer() {
            if (player) player.destroy();
            document.getElementById('player-view').style.display = 'none';
        }

        carregarCatalogo();
    </script>
</body>
</html>
